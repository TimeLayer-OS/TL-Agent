name: ci

# Lightweight test gate on every push/PR to main. Linux only — enough to catch
# breakage before a release tag runs the full cross-OS build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: timelayer-agent-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --workspace

  schema:
    name: validate example-bundle against schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install jsonschema
      - run: python3 scripts/validate_bundle.py example-bundle
